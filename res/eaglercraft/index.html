<!DOCTYPE html>
    <head>
        <title>ABSCWQ V2 - EAGLERCRAFT</title>
        <link rel="icon" href="/favicon.svg" type="image/svg+xml">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,400;0,700;1,100;1,400;1,700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/style.css">
    </head>
    
    <body>
        <div class="content">
            <h1>Eaglercraft</h1>

            <label for="mc-select">Select Version:</label><br>
            <select id="mc-select">            
                <optgroup label="Unmodified Versions">
                    <option value="1.12.2">1.12.2</option>
                    <option value="1.12.2-wasm">1.12.2-wasm</option>
                    <option value="1.8.8">1.8.8</option>
                    <option value="1.8.8-wasm">1.8.8-wasm</option>
                    <option value="1.6.4">1.6.4</option>
                    <option value="1.5.2">1.5.2</option>
                    <option value="1.2.5">1.2.5</option>
                    <option value="b1.7.3">b1.7.3</option>
                    <option value="b1.4">b1.4</option>
                    <option value="b1.3">b1.3</option>
                    <option value="b1.1">b1.1</option>
                    <option value="a1.2.6">a1.2.6</option>
                    <option value="a1.1.2">a1.1.2</option>
                    <option value="infdev-wasm">infdev-wasm</option>
                    <option value="infdev">infdev</option>
                    <option value="indev">indev</option>
                    <option value="c0.30">c0.30</option>
                    <option value="c0.30-wasm">c0.30-wasm</option>
                </optgroup>
                <optgroup label="Custom Clients">
                    <option value="astraclient">astraclient</option>
                    <option value="eaglerforge">eaglerforge</option>
                    <option value="pixelclient">pixelclient</option>
                    <option value="resentclient">resentclient</option>
                    <option value="shadowclient">shadowclient</option>
                    <option value="starlikeclient">starlikeclient</option>
                    <option value="tuffclient">tuffclient</option>
                </optgroup>
            </select><br><br>

            <button type="button" onclick="launchGame()">Play</button><br><br>
            
            <script>
            function launchGame() {
                var dropdown = document.getElementById("mc-select");
                var selectedValue = dropdown.value;

                if (selectedValue) {
                    window.location.href = selectedValue;
                }
            }
            </script>

            <a href="/">Go back</a>
        </div>
    </body>
</html>
