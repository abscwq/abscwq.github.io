    <link rel="manifest" href="manifest.json" />

  </head>
  <body>
    <header>
      <div class="header-content">
        <div class="logo">GN-MATH (ABSCWQ EDITION)</div>
        <div class="search-container">
          <input type="text" id="searchBar" placeholder="SEARCH" oninput="filterZones()" />
          <select id="sortOptions" onchange="sortZones()">
            <option value="name">NAME</option>
            <option value="id">DATE</option>
            <option value="popular">POPULAR</option>
            <option value="trendingDay">TRENDING (DAY)</option>
            <option value="trendingWeek">TRENDING (WEEK)</option>
            <option value="trendingMonth">TRENDING (MONTH)</option>
          </select>
          <select id="filterOptions" onchange="filterZones2()">
            <option value="none">TAG</option>
          </select>
        </div>
        <div class="control-buttons">
          <button id="refresh" class="control-button" title="Refresh" onclick="listZones()">
            <img src="refresh-icon.png" alt="refresh" />
          </button>
          <button id="settings" class="control-button" title="Settings">
            <img src="setting.png" alt="settings" />
          </button>
        </div>
      </div>
    </header>

    <main>
      <details id="featuredZonesWrapper" open>
        <summary id="allZonesSummary">Featured Zones</summary>
        <div id="featuredZones"></div>
      </details>
      <details id="allZonesWrapper" open>
        <summary id="allSummary">All Zones</summary>
        <div id="container">Loading...</div>
      </details>
    </main>

    <div id="zoneViewer">
      <div class="zone-header">
        <div class="zone-title">
          <h2 id="zoneName">Zone</h2>
          <button class="info-button" onclick="showZoneInfo()" title="Zone Information">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="16" x2="12" y2="12"></line>
              <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
          </button>
          <span id="zoneId" style="display:none"></span>
          <a id="zoneAuthor" href="#" target="_blank">// Author</a>
        </div>
        <div class="zone-controls">
          <button onclick="fullscreenZone()">Fullscreen</button>
          <button onclick="aboutBlank()">New Tab</button>
          <button onclick="downloadZone()">Download</button>
          <button onclick="closeZone()">Close</button>
        </div>
      </div>
      <iframe id="zoneFrame"></iframe>
    </div>

    <div id="popupOverlay">
      <div class="popup">
        <div class="popup-header">
          <h3 id="popupTitle">Title</h3>
          <button id="popupClose" onclick="closePopup()">×</button>
        </div>
        <div id="popupBody">Content will be here</div>
      </div>
    </div>

    <footer>
      <div class="footer-links">
        <a href="#" onclick="loadDMCA(); return false;">DMCA</a>
        <a href="#" onclick="showContact(); return false;">Contact</a>
        <a href="#" onclick="loadPrivacy(); return false;">Privacy</a>
        <a href="javascript:saveData()">Export</a>
        <a href="#" onclick="document.getElementById('importData').click(); return false;">Import</a>
        <input type="file" id="importData" style="display:none" onchange="loadData(event)" />
      </div>
      <div>
        <script type="text/javascript">
          aclib.runBanner({ zoneId: '10952070' });
        </script>
      </div>
    </footer>

    <script src="script.js"></script>
    <script>
      try {
        const search = new URLSearchParams(window.location.search)
        if (search.get('privacy')) loadPrivacy()
      } catch (e) {}
    </script>
    <script>
      navigator.serviceWorker.register(location.protocol + '//' + location.hostname + '/sw.js')
    </script>
  </body>
